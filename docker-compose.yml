# --- 타임존 정책: 전 컨테이너 Asia/Seoul(KST) 통일 ---
# - TZ 환경변수와 호스트 /etc/localtime·/etc/timezone 읽기전용 바인드 마운트를 함께 적용한다.
# - .env 파일에는 TZ를 추가하지 않는다 (compose 레벨 anchor로 고정값 주입).
# - PostgreSQL은 TIMESTAMPTZ(UTC 내부 저장) 원칙을 유지하되, 세션/서버 타임존과 로그·배치
#   실행 기준은 KST로 통일한다 (PGTZ 참조).
x-tz-env: &tz-env
  TZ: Asia/Seoul

x-tz-localtime-ro: &tz-localtime-ro /etc/localtime:/etc/localtime:ro
x-tz-timezone-ro: &tz-timezone-ro /etc/timezone:/etc/timezone:ro

services:
  db:
    image: postgres:16-alpine
    container_name: hrm-db
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz-env
      PGTZ: Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5442:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - *tz-localtime-ro
      - *tz-timezone-ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - hrm-net

  redis:
    image: redis:7-alpine
    container_name: hrm-redis
    restart: unless-stopped
    environment:
      <<: *tz-env
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
      - *tz-localtime-ro
      - *tz-timezone-ro
    networks:
      - hrm-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm-api
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz-env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - *tz-localtime-ro
      - *tz-timezone-ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hrm-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm-worker
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz-env
    command: ["python", "-m", "app.worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - *tz-localtime-ro
      - *tz-timezone-ro
    networks:
      - hrm-net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrm-web
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz-env
    ports:
      - "3030:3000"
    depends_on:
      - api
    volumes:
      - *tz-localtime-ro
      - *tz-timezone-ro
    networks:
      - hrm-net

networks:
  hrm-net:
    driver: bridge
